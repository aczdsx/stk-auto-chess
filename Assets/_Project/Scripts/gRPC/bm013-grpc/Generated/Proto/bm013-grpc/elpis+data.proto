syntax = "proto3";
package tech.hive.v1;

import "elpis+facility.proto";
import "elpis+core_research.proto";
import "elpis+simulation.proto";

message ElpisData {
  // 시설 목록
  repeated ElpisFacility facilities = 1;

  // 연구 정보
  repeated CoreResearch core_researches = 2;

  // 전투 시뮬레이션 정보
  SimulationData simulation = 3;
}
