syntax = "proto3";

package tech.hive.v1;

import "base.proto";
import "custom_common.proto";

import "gacha+data.proto";

// 가챠 서비스
service GachaService {
  /**
   * 가챠 정보 조회
   */
  rpc List(GachaListRequest) returns (GachaListResponse);

  /**
   * 가챠 실행
   */
  rpc Draw(DrawGachaRequest) returns (DrawGachaResponse);
}

enum GachaErrorCode {
  GACHA_UNSPECIFIED = 0;

  GACHA_NOT_FOUND = 10130601; // 가챠 데이터가 없음
  GACHA_NOT_IN_PERIOD = 10130602;  // 가챠 기간이 아님
}

message GachaListRequest {}
message GachaListResponse {
  ResponseStatus status = 1;
  repeated GachaData gacha_list = 2;
}

message DrawGachaRequest {
  string gacha_id = 1;
}

message DrawGachaResponse {
  ResponseStatus status = 1;
  repeated GachaResult results = 2;
  repeated CurrencyDelta currency_deltas = 3;
}
