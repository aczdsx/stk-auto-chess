syntax = "proto3";

package tech.hive.v1;

// 시설 타입
enum ElpisFacilityType {
  FACILITY_TYPE_UNSPECIFIED = 0;
  FACILITY_TYPE_COMMAND_CENTER = 1;     // 커멘드 센터
  FACILITY_TYPE_NEST = 2;               // 숙소
  FACILITY_TYPE_DIMENSION_LAB = 3;      // 코어 연구소
  FACILITY_TYPE_SIMULATION_CENTER = 4;  // 전투 시뮬레이션 센터
}

// 시설 정보
message ElpisFacility {
  uint32 build_id = 1;
  ElpisFacilityType type = 2;
  
  uint32 level = 3;
  uint32 max_level = 4;
  
  // 건설 시간
  uint64 built_at = 5;
  
  // 위치 정보 (그리드 좌표)
  int32 grid_x = 6;
  int32 grid_y = 7;

  bool is_upgrading = 8;
}
