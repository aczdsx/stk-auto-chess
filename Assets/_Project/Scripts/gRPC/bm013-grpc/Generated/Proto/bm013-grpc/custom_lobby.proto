syntax = "proto3";

package tech.hive.v1;

import "base.proto";

import "custom_lobby+player_data.proto";

service CustomLobbyService {
  /**
   * 내 정보 조회
   */
  rpc GetMyPlayerData(CustomLobbyGetMyPlayerDataRequest) returns (CustomLobbyGetMyPlayerDataResponse);

  /**
   * 대표 캐릭터 설정
   */
  rpc SetRepresentativeCharacter(CustomLobbySetRepresentativeCharacterRequest) returns (CustomLobbySetRepresentativeCharacterResponse);
}


enum CustomLobbyErrorCode {
  CUSTOM_LOBBY_UNSPECIFIED = 0;
}

message CustomLobbyGetMyPlayerDataRequest {}
message CustomLobbyGetMyPlayerDataResponse {
  ResponseStatus status = 1;
  CustomPlayerData data = 2;
}

message CustomLobbySetRepresentativeCharacterRequest {
  string character_id = 1;
}

message CustomLobbySetRepresentativeCharacterResponse {
  ResponseStatus status = 1;
}
