syntax = "proto3";

package tech.hive.v1;

message CharacterStats {
  CharacterGrowthStats growth = 1;
  CharacterFixedStats fixed = 2;
}

 // 성장형 능력치
 message CharacterGrowthStats {
  uint64 hp = 1;                  // 체력
  uint64 max_hp = 2;              // 최대 체력
  int32 physical_attack = 3;     // 물리 공격력
  int32 magical_attack = 4;      // 마법 공격력
  int32 physical_defense = 5;    // 물리 방어력
  int32 magical_defense = 6;     // 마법 방어력
}

// 고정형 능력치
message CharacterFixedStats {
  float move_speed = 7;          // 이동속도
  float attack_speed = 8;        // 공격속도
  float critical_rate = 9;       // 치명타 확률 (%)
  float critical_damage = 10;    // 치명타 피해량 (%)
  float accuracy = 11;           // 명중률 (%)
  float evasion = 12;            // 회피율 (%)
  float block_rate = 13;         // 블럭율 (%)
  int32 physical_penetration = 14;  // 물리 관통력
  int32 magical_penetration = 15;   // 마법 관통력
  float physical_resistance = 16;   // 물리 저항력 (%)
  float magical_resistance = 17;    // 마법 저항력 (%)
  float healing_bonus = 18;      // 치유량 보너스 (%)
  float damage_reduction = 19;   // 피해 감소율 (%)
}
