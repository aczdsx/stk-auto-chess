syntax = "proto3";

package tech.hive.v1;

import "base.proto";
import "custom_common.proto";

import "guide_mission+data.proto";

service GuideMissionService {
  /**
   * 가이드 미션 목록 조회
   */
  rpc Get(GuideMissionGetRequest) returns (GuideMissionGetResponse);

  /**
   * 가이드 미션 보상 수령
   */
  rpc ClaimReward(GuideMissionClaimRewardRequest) returns (GuideMissionClaimRewardResponse);
}

enum GuideMissionErrorCode {
  GUIDE_MISSION_UNSPECIFIED = 0;
}

message GuideMissionGetRequest {}
message GuideMissionGetResponse {
  ResponseStatus status = 1;
  GuideMissionData guide_mission = 2;
}

message GuideMissionClaimRewardRequest {
  uint32 guide_mission_id = 1;
}

message GuideMissionClaimRewardResponse {
  ResponseStatus status = 1;
  GuideMissionData guide_mission = 2;
  repeated Reward rewards = 3;
  repeated CurrencyDelta currency_deltas = 4;
}
