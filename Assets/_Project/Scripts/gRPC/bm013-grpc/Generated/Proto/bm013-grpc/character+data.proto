syntax = "proto3";
// 캐릭터 정보
package tech.hive.v1;

import "custom_common.proto";

import "character+stat.proto";
import "character+skill.proto";
import "character+resonance.proto";

message CharacterData {
  string instance_id = 1;        // 유저의 캐릭터 인스턴스 ID
  uint32 character_id = 2;       // 캐릭터 마스터 데이터 ID
  
  // 기본 정보
  Rarity rarity = 3;
  ElementType element = 4;
  ClassType class_type = 5;
  
  // 성장 정보
  uint32 level = 6;
  uint32 max_level = 7;
  uint64 exp = 8;
  uint64 exp_to_next_level = 9;
  
  // 승급 (나이트 승급)
  uint32 promotion_level = 10;    // 0~7 (최대 7성)
  
  // 초월
  uint32 transcend_level = 11;    // 0~5
  
  // 공명
  uint32 resonance_points = 12;   // 사용 가능한 공명 포인트
  uint32 total_resonance_points = 13;  // 총 획득한 공명 포인트
  repeated ResonanceNode resonance_nodes = 14;
  
  // 능력치
  CharacterStats stats = 15;
  
  // 스킬
  repeated Skill skills = 16;
  
  // 장비
  EquippedItems equipped_items = 17;
  
  // 전투력
  uint64 combat_power = 18;
  
  // 획득 시간
  uint64 obtained_at = 19;
}

message EquippedItems {
  string stellum_instance_id = 1;
  repeated string relic_instance_ids = 2;
}
