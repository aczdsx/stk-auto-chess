syntax = "proto3";

package tech.hive.v1;

import "base.proto";

service PlayerUnsafeDataService {
  /**
   * 플레이어 설정과 같은 중요하지 않은 데이터를 조회합니다.
   */
  rpc Get(PlayerUnsafeDataGetRequest) returns (PlayerUnsafeDataGetResponse) {}

  /**
   * 플레이어 설정과 같은 중요하지 않은 데이터를 수정합니다. (덮어쓰기)
   */
  rpc Set(PlayerUnsafeDataSetRequest) returns (PlayerUnsafeDataSetResponse) {}
}

enum PlayerUnsafeDataErrorCode {
  PLAYER_UNSAFE_DATA_UNSPECIFIED = 0;
}

message PlayerUnsafeDataGetRequest {
}

message PlayerUnsafeDataGet {
  bytes data = 1;
}

message PlayerUnsafeDataGetResponse {
  ResponseStatus status = 1;
  PlayerUnsafeDataGet data = 2;
}

message PlayerUnsafeDataSetRequest {
  bytes data = 1;
}

message PlayerUnsafeDataSetResponse {
  ResponseStatus status = 1;
}
