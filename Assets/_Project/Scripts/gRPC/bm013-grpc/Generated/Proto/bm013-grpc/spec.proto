syntax = "proto3";

package tech.hive.v1;

import "base.proto";

enum SpecType {
  SPEC_TYPE_UNSPECIFIED = 0;
  SPEC_TYPE_GAME = 1;
  SPEC_TYPE_LANGUAGE = 2;
  SPEC_TYPE_ETC_SPEC = 3;
}

service SpecService {
  /**
   * 스펙 데이터를 조회합니다.
   */
  rpc GetSpecData(SpecDataRequest) returns (SpecDataResponse) {}

  /**
   * 언어 데이터를 조회합니다.
   */
  rpc GetLanguageData(SpecDataRequest) returns (SpecDataResponse) {}

  /**
   * 기타 스펙 데이터를 조회합니다.
   */
  rpc GetEtcSpecData(SpecDataRequest) returns (SpecDataResponse) {}

  /**
   * Streaming 스펙 다운로드
   */
  rpc DownloadSpecData(DownloadSpecDataRequest) returns (stream DownloadSpecDataResponse) {}
}

enum SpecErrorCode {
  SPEC_UNSPECIFIED = 0;
  SPEC_NOT_FOUND = 2100; // 스펙 데이터가 없음
}

message SpecDataRequest {
 uint32 version = 1;
}

message SpecData {
  bytes spec = 1;
  uint32 version = 2;
}

message SpecDataResponse {
  ResponseStatus status = 1;
  SpecData data = 2;
}


message DownloadSpecDataRequest {
  uint32 version = 1;
  SpecType type = 2;
  optional uint32 start_offset = 3; // 다운로드 시작 오프셋
}

message DownloadSpecDataResponse {
  ResponseStatus status = 1;
  bytes data = 2;
  uint32 total_offset = 3;
  uint32 total_size = 4;
  bool is_end = 5;
}
