syntax = "proto3";
package tech.hive.v1;

import "base.proto";
import "post+base_message.proto";

service AnnouncementService {
  rpc List(AnnouncementListRequest) returns (AnnouncementListResponse) {}
}

enum AnnouncementErrorCode {
  ANNOUNCEMENT_UNSPECIFIED = 0;
}

message AnnouncementListRequest {
  PaginationInfo pagination = 1;
}

message AnnouncementInfo {
  string announcementId = 1;
  enum Status {
    ACTIVE = 0;
    INACTIVE = 1;
  }
  Status status = 2;
  optional string app_version = 3;
  string started_at = 4;
  string ended_at = 5;
  uint32 priority = 6;
  repeated BaseMessageContent content = 7;
}

message AnnouncementListResponse {
  ResponseStatus status = 1;
  PaginationMeta meta = 2;
  repeated AnnouncementInfo item_list = 3;
}
