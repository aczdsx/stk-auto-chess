syntax = "proto3";

package tech.hive.v1;

import "base.proto";
import "custom_common.proto";

import "elpis+data.proto";
import "elpis+facility.proto";
import "elpis+core_research.proto";
import "elpis+simulation.proto";

// 함선 서비스
service ElpisService {
  /**
   * 함선 목록을 조회합니다.
  */
  rpc Get(ElpisGetRequest) returns (ElpisGetResponse) {}

  /**
   * 함선 확장 (코어 사용)
   */
  rpc Expand(ElpisExpandRequest) returns (ElpisExpandResponse);

  /**
   * 시설 건설
   */
  rpc BuildFacility(ElpisBuildFacilityRequest) returns (ElpisBuildFacilityResponse);

  /**
   * 시설 건설 완료
   */
  rpc FinishBuildingFacility(ElpisFinishBuildingFacilityRequest) returns (ElpisFinishBuildingFacilityResponse);
  
  /**
   * 시설 업그레이드
   */
  rpc UpgradeFacility(ElpisUpgradeFacilityRequest) returns (ElpisUpgradeFacilityResponse);
  
  /**
   * 코어 연구소 - 연구 진행
   */
  rpc ResearchCore(ElpisResearchCoreRequest) returns (ElpisResearchCoreResponse);
  
  /**
   * 시설 위치 변경
   */
  rpc ChangeFacilityPosition(ElpisChangeFacilityPositionRequest) returns (ElpisChangeFacilityPositionResponse);
  
  /**
   * 전투 시뮬레이션 - 보상 수령
   */
  rpc ClaimSimulationReward(ElpisClaimSimulationRewardRequest) returns (ElpisClaimSimulationRewardResponse);
}

enum ElpisErrorCode {
  ELPIS_UNSPECIFIED = 0;

  ELPIS_FACILITY_COUNT_EXCEEDED = 10130101; // 시설 개수를 초과했습니다.
  ELPIS_FACILITY_TYPE_INVALID = 10130102; // 유효하지 않은 시설 타입입니다.

  ELPIS_FACILITY_NOT_FOUND = 10130103; // 시설을 찾을 수 없습니다.
  ELPIS_FACILITY_NOT_BUILDING = 10130104; // 시설을 건설하고 있지 않습니다.
  ELPIS_FACILITY_NOT_FINISHED_BUILDING = 10130105; // 시설 건설이 완료되지 않았습니다.
  ELPIS_FACILITY_MAX_LEVEL_REACHED = 10130106; // 시설이 최대 레벨에 도달했습니다.

  ELPIS_FACILITY_COMMAND_CENTER_NOT_FOUND = 10130107; // 커맨드센터가 없음.

  ELPIS_CORE_RESEARCH_UPGRADE_GROUP_NOT_FOUND = 10130108; // 코어 연구 업그레이드 그룹을 스펙에서 찾을 수 없습니다.
  ELPIS_CORE_RESEARCH_MAX_LEVEL_REACHED = 10130109; // 코어 연구 최대 레벨에 도달했습니다.

  ELPIS_FACILITY_BUILD_FAILED = 10130110; // 요청된 건물중에 지을 수 없는 건물이 포함됐습니다. (ONLYONE 타입인데, 이미 있거나 개수를 초과했거나)
}

message ElpisGetRequest {}
message ElpisGetResponse {
  ResponseStatus status = 1;
  ElpisData elpis = 2;
}

message ElpisExpandRequest {}
message ElpisExpandResponse {
  ResponseStatus status = 1;
  ElpisFacility facility = 2; // 커맨드센터
  repeated CurrencyDelta currency_deltas = 3;
}

message ElpisBuildFacilityRequest {
  ElpisFacilityType facility_type = 1;
  int32 grid_x = 2;
  int32 grid_y = 3;
}

message ElpisBuildFacilityResponse {
  ResponseStatus status = 1;
  ElpisFacility facility = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ElpisFinishBuildingFacilityRequest {
  string facility_instance_id = 1;
}

message ElpisFinishBuildingFacilityResponse {
  ResponseStatus status = 1;
  ElpisFacility facility = 2;
}

message ElpisUpgradeFacilityRequest {
  string facility_instance_id = 1;
}

message ElpisUpgradeFacilityResponse {
  ResponseStatus status = 1;
  ElpisFacility facility = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ElpisResearchCoreRequest {
  uint32 upgrade_group_id = 1;
  uint32 level = 2;  // 올릴 레벨 수
}

message ElpisResearchCoreResponse {
  ResponseStatus status = 1;
  CoreResearch research = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ElpisChangeFacilityPositionRequest {
  string facility_instance_id = 1;
  int32 grid_x = 2;
  int32 grid_y = 3;
}

message ElpisChangeFacilityPositionResponse {
  ResponseStatus status = 1;
  ElpisFacility facility = 2;
}

message ElpisClaimSimulationRewardRequest {}
message ElpisClaimSimulationRewardResponse {
  ResponseStatus status = 1;
  SimulationData simulation = 2;
  repeated CurrencyDelta currency_deltas = 3;
}
