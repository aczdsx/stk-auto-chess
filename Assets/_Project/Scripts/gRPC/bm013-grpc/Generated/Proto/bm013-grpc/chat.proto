syntax = "proto3";
package tech.hive.v1;

import "base.proto";

service ChatService {
  rpc ListChatRoom(ListChatRoomRequest) returns (ListChatRoomResponse) {} // 채팅방 목록 조회
  rpc ListChatMessage(ListChatMessageRequest) returns (ListChatMessageResponse) {} // 채팅 메세지 목록 조회

  rpc JoinGroupChat(JoinGroupChatRequest) returns (JoinGroupChatResponse) {} // 그룹 채팅방 참여

  rpc SendDirectMessage(SendDirectMessageRequest) returns (SendDirectMessageResponse) {} // 개인 채팅 메세지 전송
  rpc SendGlobalMessage(SendGlobalMessageRequest) returns (SendGlobalMessageResponse) {} // 전체 채팅 메세지 전송
  rpc SendGroupMessage(SendGroupMessageRequest) returns (SendGroupMessageResponse) {} // 그룹 채팅 메세지 전송
  rpc ReceiveMessage(stream ReceiveMessageRequest) returns (stream ReceiveMessageResponse) {} // 채팅 메세지 수신(request를 주기적으로 날려 ping 처리 해주어야 함)
}

enum ChatErrorCode {
  CHAT_UNSPECIFIED = 0;
  CHAT_NOT_FOUND_ROOM = 4701;
}

message ListChatRoomRequest {
  PaginationInfo pagination = 1;
    // 채팅방 타입 (global, direct)
  optional string type = 2;
}

message ListChatRoomResponse {
  ResponseStatus status = 1;
  PaginationMeta meta = 2;
  repeated ChatRoom item_list = 3; // 채팅방 목록
}

message ChatRoom {
  // 채팅방 고유 아이디 (room_id)
  string id = 1;
  // 채팅방 타입 (global, direct)
  string type = 2;
  // 채팅방 멤버 목록
  repeated string members = 3;
  // 채팅방 생성 시간
  string created_at = 4;
}

message ListChatMessageRequest {
  CursorInfo cursor = 1;
  string room_id = 2; // 팀채팅의 경우 roomId는 `team_${groupId}` 형태임
}

message ListChatMessageResponse {
  ResponseStatus status = 1;
  CursorMeta meta = 2;
  repeated ChatMessage item_list = 3; // 채팅 메세지 목록
}

message ChatMessage {
  string id = 1; // 메세지 고유 ID
  string sender_player_id = 2; // 메세지 전송한 player_id
  string message = 3; // 메세지 내용
  int32 timestamp = 4; // 메세지 전송 시간(UTC Unix)
  optional bytes metadata = 5; // 바이너리 메타데이터(클라에서 추가적으로 전송하고 싶은 데이터)
}

message SendDirectMessageRequest {
  string target_player_id = 1; // 메세지 수신자 player_id
  string message = 2;
  optional bytes metadata = 3;
}

message SendDirectMessageResponse {
  ResponseStatus status = 1;
}

message SendGlobalMessageRequest {
  string message = 1;
  optional bytes metadata = 2;
}

message SendGlobalMessageResponse {
  ResponseStatus status = 1;
}

message SendGroupMessageRequest {
  string group_id = 1; // 그룹 아이디
  string message = 2;
  optional bytes metadata = 3;
}

message SendGroupMessageResponse {
  ResponseStatus status = 1;
}

message JoinGroupChatRequest {
  string group_id = 1; // 그룹 아이디
}

message JoinGroupChatResponse {
  ResponseStatus status = 1;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_GLOBAL = 1;
  MESSAGE_TYPE_DIRECT = 2;
  MESSAGE_TYPE_GROUP = 3;
}

// 채팅 메세지 수신 Input stream 데이터 (request를 주기적으로 날려 ping 처리 해주어야 함)
message ReceiveMessageRequest {
}

message ReceiveMessageResponse {
  ResponseStatus status = 1;
  MessageType message_type = 2; // 메세지 타입
  oneof message {
    GlobalMessage global_message = 3; // 전체 채팅 메세지
    DirectMessage direct_message = 4; // 개인 채팅 메세지
    GroupMessage group_message = 5; // 그룹 채팅 메세지
  }
}

message GlobalMessage {
  string id = 1; // 메세지 고유 ID
  string sender_player_id = 2; // 메세지 전송자
  string message = 3; // 메세지 내용
  int32 timestamp = 4; // 메시지 전송 시간(UTC Unix)
  optional bytes metadata = 5; // 바이너리 메타데이터(클라에서 추가적으로 전송하고 싶은 데이터)
}

message DirectMessage {
  string id = 1; // 메세지 고유 ID
  string sender_player_id = 2; // 메세지 전송자
  string target_player_id = 3; // 메세지 수신자
  string message = 4; // 메세지 내용
  int32 timestamp = 5; // 메시지 전송 시간(UTC Unix)
  optional bytes metadata = 6; // 바이너리 메타데이터(클라에서 추가적으로 전송하고 싶은 데이터)
}

message GroupMessage {
  string id = 1; // 메세지 고유 ID
  string sender_player_id = 2; // 메세지 전송자
  string message = 3; // 메세지 내용
  int32 timestamp = 4; // 메시지 전송 시간(UTC Unix)
  string group_id = 5; // 그룹 아이디
  optional bytes metadata = 6; // 바이너리 메타데이터(클라에서 추가적으로 전송하고 싶은 데이터)
}
