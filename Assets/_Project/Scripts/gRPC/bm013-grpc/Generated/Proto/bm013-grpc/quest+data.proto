syntax = "proto3";

package tech.hive.v1;

import "custom_common.proto";

message QuestData {
  uint32 quest_id = 1;

  // 현재 진행값
  uint32 current_count = 2;

  // 목표값
  uint32 goal_count = 3;

  // 보상 목록
  repeated Reward rewards = 4;

  // 만료 시간
  uint64 expired_at = 5;

  bool is_rewarded = 6;

  bool is_cleared = 7;
}

// 퀘스트 타입
enum QuestType {
  QUEST_TYPE_UNSPECIFIED = 0;
  QUEST_TYPE_DAILY = 1;         // 일일 퀘스트
}
