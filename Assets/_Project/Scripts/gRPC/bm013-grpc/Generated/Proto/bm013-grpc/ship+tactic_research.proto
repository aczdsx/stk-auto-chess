syntax = "proto3";

package tech.hive.v1;

// ========== 전술 연구소 ==========

// 전술 연구 타입 (설치물)
enum TacticResearchType {
  TACTIC_RESEARCH_TYPE_UNSPECIFIED = 0;
  TACTIC_RESEARCH_TYPE_WALL = 1;           // 가벽
  TACTIC_RESEARCH_TYPE_TRAP = 2;           // 덫
  TACTIC_RESEARCH_TYPE_FIRE_TRAP = 3;      // 화염 지옥
  TACTIC_RESEARCH_TYPE_ICE_TRAP = 4;       // 빙결 지옥
  TACTIC_RESEARCH_TYPE_THUNDER_TRAP = 5;   // 뇌격 지옥
  TACTIC_RESEARCH_TYPE_STORM_TRAP = 6;     // 폭풍 지옥
  TACTIC_RESEARCH_TYPE_QUICKSAND = 7;      // 개미 지옥
  TACTIC_RESEARCH_TYPE_LOG_TRAP = 8;       // 통굴러가유
  TACTIC_RESEARCH_TYPE_FOG_TRAP = 9;       // 안개 지옥
  TACTIC_RESEARCH_TYPE_MINE = 10;          // 전차 지뢰
  TACTIC_RESEARCH_TYPE_ATK_BUFF_ZONE = 11; // 공격력 증가 존
  TACTIC_RESEARCH_TYPE_DEF_BUFF_ZONE = 12; // 방어력 증가 존
  TACTIC_RESEARCH_TYPE_SPD_BUFF_ZONE = 13; // 공격속도 증가 존
  TACTIC_RESEARCH_TYPE_ATK_DEBUFF_ZONE = 14; // 공격력 감소 존
  TACTIC_RESEARCH_TYPE_DEF_DEBUFF_ZONE = 15; // 방어력 감소 존
  TACTIC_RESEARCH_TYPE_SPD_DEBUFF_ZONE = 16; // 공격속도 감소 존
}

// 전술 연구 정보
message TacticResearch {
  TacticResearchType type = 1;
  uint32 level = 2;
  uint32 max_level = 3;
  bool is_unlocked = 4;  // 해금 여부
}

