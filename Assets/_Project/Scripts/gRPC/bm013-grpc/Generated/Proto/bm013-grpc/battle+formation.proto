syntax = "proto3";

package tech.hive.v1;

// 전투 편성
message BattleFormation {
  repeated BattleFormationSlot slots = 1;
}

// 편성 슬롯
message BattleFormationSlot {
  int32 position = 1;  // 0~N (배치 위치)
  string character_instance_id = 2;
  
  // 그리드 좌표 (오토 배틀러 특성상 배치 위치 중요)
  int32 grid_x = 3;
  int32 grid_y = 4;
}

// 전술 설치물 배치
message TacticPlacement {
  string tactic_id = 1;  // 전술 연구소에서 연구한 설치물 ID
  int32 grid_x = 2;
  int32 grid_y = 3;
}
