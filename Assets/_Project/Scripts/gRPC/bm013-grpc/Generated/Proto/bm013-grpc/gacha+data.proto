syntax = "proto3";

package tech.hive.v1;

import "custom_common.proto";

// 가챠 정보
message GachaData {
  string gacha_id = 1;

  uint32 gacha_count = 2;

  // 소모 아이템 정보
  repeated Consume consumes = 3;
  repeated GachaItem items = 4;

  optional uint64 start_time = 5;
  optional uint64 end_time = 6;
}

message GachaItem {
  uint32 item_id = 1;
  uint32 count = 2;
  
  float weight_percentage = 3;
}

message GachaResult {
  uint32 item_id = 1;
  uint32 count = 2;
}
