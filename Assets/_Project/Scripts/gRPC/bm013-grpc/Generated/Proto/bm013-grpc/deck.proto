syntax = "proto3";

package tech.hive.v1;

import "base.proto";

import "deck+data.proto";

// 캐릭터 배치 덱 서비스
service DeckService {
  /**
   * 캐릭터 배치 덱 목록 조회
   */
  rpc List(DeckListRequest) returns (DeckListResponse);

  /**
   * 캐릭터 배치 덱 조회
   */
  rpc Get(DeckGetRequest) returns (DeckGetResponse);

  /**
   * 캐릭터 배치 덱 저장
   */
  rpc Save(DeckSaveRequest) returns (DeckSaveResponse);

  /**
   * 캐릭터 배치 덱 삭제
   */
  rpc Delete(DeckDeleteRequest) returns (DeckDeleteResponse);
}

enum DeckErrorCode {
  DECK_UNSPECIFIED = 0;

  DECK_NOT_FOUND = 10130401; // 덱을 찾을 수 없음
}

message DeckListRequest {}
message DeckListResponse {
  ResponseStatus status = 1;
  repeated DeckData deck_list = 2;
}

message DeckGetRequest {
  uint32 deck_slot_id = 1;
}
message DeckGetResponse {
  ResponseStatus status = 1;
  DeckData deck = 2;
}

message DeckSaveRequest {
  uint32 deck_slot_id = 1;
  string deck_name = 2;
  repeated DeckCharacterPlacement character_placements = 3;
  repeated DeckTacticPlacement tactic_placements = 4;
  bytes client_data = 5;
}

message DeckSaveResponse {
  ResponseStatus status = 1;
  DeckData deck = 2;
}

message DeckDeleteRequest {
  uint32 deck_slot_id = 1;
}
message DeckDeleteResponse {
  ResponseStatus status = 1;
}
