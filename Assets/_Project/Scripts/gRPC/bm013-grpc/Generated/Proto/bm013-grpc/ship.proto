syntax = "proto3";

package tech.hive.v1;

import "base.proto";
import "custom_common.proto";

import "ship+info.proto";
import "ship+facility.proto";
import "ship+core_research.proto";
import "ship+tactic_research.proto";
import "ship+simulation.proto";

// 함선 서비스
service ShipService {
  /**
   * 함선 목록을 조회합니다.
  */
  rpc GetInfo(ShipGetInfoRequest) returns (ShipGetInfoResponse) {}

  /**
   * 함선 확장 (코어 사용)
   */
  rpc ExpandShip(ShipExpandRequest) returns (ShipExpandResponse);

  /**
   * 시설 건설
   */
  rpc BuildFacility(ShipBuildFacilityRequest) returns (ShipBuildFacilityResponse);
  
  /**
   * 시설 업그레이드
   */
  rpc UpgradeFacility(ShipUpgradeFacilityRequest) returns (ShipUpgradeFacilityResponse);
  
  /**
   * 코어 연구소 - 연구 진행
   */
  rpc ResearchCore(ShipResearchCoreRequest) returns (ShipResearchCoreResponse);
  
  /**
   * 전술 연구소 - 설치물 연구
   */
  rpc ResearchTactic(ShipResearchTacticRequest) returns (ShipResearchTacticResponse);
  
  /**
   * 전투 시뮬레이션 - 보상 수령
   */
  rpc ClaimSimulationReward(ShipClaimSimulationRewardRequest) returns (ShipClaimSimulationRewardResponse);
}

enum ShipErrorCode {
  SHIP_UNSPECIFIED = 0;
}

message ShipGetInfoRequest {}
message ShipGetInfoResponse {
  ResponseStatus status = 1;
  ShipInfo info = 2;
}

message ShipExpandRequest {}
message ShipExpandResponse {
  ResponseStatus status = 1;
  ShipInfo info = 2;
}

message ShipBuildFacilityRequest {
  ShipFacilityType facility_type = 1;
  int32 grid_x = 2;
  int32 grid_y = 3;
}

message ShipBuildFacilityResponse {
  ResponseStatus status = 1;
  ShipFacility facility = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ShipUpgradeFacilityRequest {
  string facility_instance_id = 1;
}

message ShipUpgradeFacilityResponse {
  ResponseStatus status = 1;
  ShipFacility facility = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ShipResearchCoreRequest {
  CoreResearchType research_type = 1;
  uint32 levels = 2;  // 올릴 레벨 수
}

message ShipResearchCoreResponse {
  ResponseStatus status = 1;
  CoreResearch research = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ShipResearchTacticRequest {
  TacticResearchType research_type = 1;
  uint32 levels = 2;  // 올릴 레벨 수
}

message ShipResearchTacticResponse {
  ResponseStatus status = 1;
  TacticResearch research = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message ShipClaimSimulationRewardRequest {}
message ShipClaimSimulationRewardResponse {
  ResponseStatus status = 1;
  SimulationInfo simulation_info = 2;
  repeated CurrencyDelta currency_deltas = 3;
}
