syntax = "proto3";
package tech.hive.v1;

import "base.proto";

service LevelService {
  rpc ListSnapshot(ListLevelSnapshotRequest) returns (ListLevelSnapshotResponse) {}
  rpc ListIdWithIndex(ListLevelIdWithIndexRequest) returns (ListLevelIdWithIndexResponse) {}
}

enum LevelErrorCode {
  LEVEL_UNSPECIFIED = 0;
  LEVEL_TOO_MANY_REQUEST = 4801; // 요청한 레벨 정보가 너무 많습니다. 50개 이하로 요청해주세요.
  LEVEL_NOT_FOUND = 4802; // 요청한 레벨 정보를 찾을 수 없습니다.
}

message HavingLevel {
  string id = 1; // 레벨 시트내 레벨 정보의 ID
  uint32 patch_count = 2; // 클라가 들고 있는 데이터 패치 횟수. 패치 횟수가 변경되면 로컬에 해당 패치 횟수로 업데이트 해야 함.
}

message ListLevelSnapshotRequest {
  string group = 1; // 레벨 스펙의 시트 이름(그룹)
  repeated HavingLevel having_levels = 2; // 동기화할 레벨 정보의 ID 배열
}

message ListLevelSnapshotResponse {
  ResponseStatus status = 1;
  repeated LevelSnapshot level_list = 2; // 동기화할 레벨 정보
}

message ListLevelIdWithIndexRequest {
  string group = 1; // 레벨 스펙의 시트 이름(그룹)
  string id = 2; // 레벨 시트내 레벨 정보의 ID(이 데이터 Level 칼럼을 기준으로 레벨 정보를 조회합니다.)
  int32 limit = 3; // 조회할 레벨 정보의 개수
}

message ListLevelIdWithIndexResponse {
  ResponseStatus status = 1;
  repeated string ids = 2; // 조회된 레벨 정보의 ID 배열
}

message LevelSnapshot {
  string id = 1; // 레벨 시트내 레벨 정보의 ID
  uint32 level = 2; // 레벨 시트내 레벨 인덱스 정보
  uint32 patch_count = 3; // 서버가 가지고 있는 현재 데이터 패치카운트(리비전). 클라는 이 패치 횟수로 업데이트 해야 함.
  string data = 4;
}
