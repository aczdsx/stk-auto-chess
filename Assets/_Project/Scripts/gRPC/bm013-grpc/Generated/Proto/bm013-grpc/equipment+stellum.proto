syntax = "proto3";
package tech.hive.v1;

import "custom_common.proto";
import "equipment+stat.proto";

// 스텔룸 (무기) 정보
message StellumInfo {
  string instance_id = 1;
  uint32 stellum_id = 2;  // 마스터 데이터 ID
  
  // 기본 정보
  Rarity base_rarity = 3;     // 태생 등급 (1~4성)
  uint32 star_level = 4;             // 성 등급 (1~7성)
  ClassType class_type = 5;   // 직업 제한
  bool is_exclusive = 6;             // 전용 무기 여부
  string exclusive_character_id = 7; // 전용 캐릭터 ID (전용 무기인 경우)
  
  // 강화 정보
  uint32 forge_level = 8;             // 단조 레벨
  uint32 max_forge_level = 9;         // 최대 단조 레벨 (성급에 따라 결정)
  uint64 forge_exp = 10;              // 단조 경험치
  uint64 forge_exp_to_next = 11;      // 다음 레벨까지 필요한 경험치
  
  // 옵션
  EquipmentStatOption main_option = 12;       // 주옵션
  repeated EquipmentStatOption sub_options = 13;   // 부옵션
  repeated EquipmentStatOption grant_options = 14; // 부여옵션 (4성 이상)
  
  // 장착 정보
  string equipped_character_id = 15;  // 장착한 캐릭터 인스턴스 ID
  
  // 획득 시간
  uint64 obtained_at = 16;
}
