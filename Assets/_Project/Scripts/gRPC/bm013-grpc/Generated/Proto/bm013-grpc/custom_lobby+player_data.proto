syntax = "proto3";

package tech.hive.v1;

message CustomPlayerData {
  string player_id = 1;
  string nickname = 2;
  uint32 server_id = 3;

  uint32 level = 4;
  uint64 exp = 5;
  uint64 exp_to_next_level = 6;

  string representative_character_id = 7;

  uint32 last_accessed_at = 8;

  uint32 vip_level = 10;
  uint32 vip_exp = 11;
}
