syntax = "proto3";

package tech.hive.v1;

import "base.proto";
import "custom_common.proto";

import "character+data.proto";

// 캐릭터 서비스
service CharacterService {
  /**
   * 캐릭터 목록 조회
   */
  rpc List(CharacterListRequest) returns (CharacterListResponse);
  
  /**
   * 캐릭터 조회
   */
  rpc Get(CharacterGetRequest) returns (CharacterGetResponse);

  /**
   * 캐릭터 조각 교환을 통한 캐릭터 생성
   */
  rpc Create(CharacterCreateRequest) returns (CharacterCreateResponse);
  
  /**
   * 캐릭터 레벨업
   */
  rpc LevelUp(CharacterLevelUpRequest) returns (CharacterLevelUpResponse);
  
  /**
   * 캐릭터 초월
   */
  rpc Transcend(CharacterTranscendRequest) returns (CharacterTranscendResponse);

  /**
   * 캐릭터 돌파
   */
  rpc Exceed(CharacterExceedRequest) returns (CharacterExceedResponse);
}

enum CharacterErrorCode {
  CHARACTER_UNSPECIFIED = 0;
  CHARACTER_NOT_FOUND = 10130501; // 캐릭터 없음

  CHARACTER_LEVEL_UP_NOT_ENOUGH_GOLD = 10130502; // 레벨업 충분한 골드 없음
  CHARACTER_LEVEL_UP_NOT_ENOUGH_EXP = 10130503; // 레벨업 충분한 경험치 없음
  CHARACTER_LEVEL_UP_MAX_LEVEL_REACHED = 10130504; // 레벨업 최대 레벨 도달
  CHARACTER_LEVEL_UP_NOT_FOUND_NEXT_LEVEL = 10130505; // 레벨업 다음 레벨 데이터 없음

  CHARACTER_PROMOTE_MAX_PROMOTION_LEVEL_REACHED = 10130506; // 승급 최대 승급 레벨 도달

  CHARACTER_EQUIP_STELLUM_NOT_FOUND = 10130507; // 해당하는 Stellum이 없음
  CHARACTER_EQUIP_RELIC_NOT_FOUND = 10130508; // 해당하는 Relic이 없음

  CHARACTER_ALREADY_EXISTS = 10130509; // 이미 해당 캐릭터가 있음
}

message CharacterListRequest {}
message CharacterListResponse {
  ResponseStatus status = 1;
  repeated CharacterData characters = 2;
}

message CharacterGetRequest {
  string instance_id = 1;
}
message CharacterGetResponse {
  ResponseStatus status = 1;
  CharacterData character = 2;
}

message CharacterCreateRequest {
  uint32 character_id = 1;
}
message CharacterCreateResponse {
  ResponseStatus status = 1;
  CharacterData character = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message CharacterLevelUpRequest {
  string instance_id = 1;
}
message CharacterLevelUpResponse {
  ResponseStatus status = 1;
  CharacterData character = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message CharacterPromoteRequest {
  string instance_id = 1;
}
message CharacterPromoteResponse {
  ResponseStatus status = 1;
  CharacterData character = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message CharacterTranscendRequest {
  string instance_id = 1;
}
message CharacterTranscendResponse {
  ResponseStatus status = 1;
  CharacterData character = 2;
  repeated CurrencyDelta currency_deltas = 3;
}

message CharacterExceedRequest {
  string instance_id = 1;
}
message CharacterExceedResponse {
  ResponseStatus status = 1;
  CharacterData character = 2;
  repeated CurrencyDelta currency_deltas = 3;
}
