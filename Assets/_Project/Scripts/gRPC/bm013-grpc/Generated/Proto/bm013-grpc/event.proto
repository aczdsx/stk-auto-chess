syntax = "proto3";

package tech.hive.v1;

import "base.proto";
import "custom_common.proto";

import "event+data.proto";

service EventService {
  /**
   * 이벤트 목록 조회
   */
  rpc List(EventListRequest) returns (EventListResponse);

  /**
   * 이벤트 진행 사항 업데이트
   */
  rpc UpdateProgress(EventUpdateProgressRequest) returns (EventUpdateProgressResponse);

  /**
   * 이벤트 보상 수령
   */
  rpc ClaimReward(EventClaimRewardRequest) returns (EventClaimRewardResponse);
}

enum EventErrorCode {
  EVENT_UNSPECIFIED = 0;

  EVENT_INFO_NOT_FOUND = 10131101; // 이벤트 정보를 찾을 수 없음
  EVENT_SERVER_ONLY = 10131102; // 서버 전용 이벤트라 클라이언트에서 변경할 수 없음
}

message EventListRequest {}
message EventListResponse {
  ResponseStatus status = 1;
  repeated EventData events = 2;
}

message EventUpdateProgressRequest {
  uint32 event_id = 1;
  uint32 add_current_count = 2;
}

message EventUpdateProgressResponse {
  ResponseStatus status = 1;
  EventData event = 2;
}

message EventClaimRewardRequest {
  uint32 event_id = 1;
  uint32 event_condition_id = 2;
}

message EventClaimRewardResponse {
  ResponseStatus status = 1;
  EventData event = 2;
  repeated Reward rewards = 3;
  repeated CurrencyDelta currency_deltas = 4;
}
