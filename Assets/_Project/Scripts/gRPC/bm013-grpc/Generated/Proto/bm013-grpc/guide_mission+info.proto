syntax = "proto3";

package tech.hive.v1;

import "custom_common.proto";

// 가이드 미션 정보
message GuideMissionInfo {
  uint32 guide_mission_id = 1;        // 가이드 미션 아이디
  uint32 order = 2;                   // 미션 순서
  uint32 current_count = 3;           // 현재 행동 횟수
  uint32 goal_count = 4;              // 목표 행동 횟수
  GuideMissionState state = 5;        // 미션 상태
  repeated Reward rewards = 6;        // 보상 목록
}

enum GuideMissionState {
  GUIDE_MISSION_STATE_UNSPECIFIED = 0;
  GUIDE_MISSION_STATE_NOT_STARTED = 1; // 미션 시작 전
  GUIDE_MISSION_STATE_IN_PROGRESS = 2; // 미션 진행 중
  GUIDE_MISSION_STATE_COMPLETED = 3;   // 미션 완료
}
