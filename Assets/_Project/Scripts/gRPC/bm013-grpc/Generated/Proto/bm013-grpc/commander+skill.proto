syntax = "proto3";

package tech.hive.v1;

message CommanderSkillData {
  uint32 commander_skill_id = 1;      // 스킬 아이디
  uint32 level = 2;                   // 레벨
  optional uint32 equipped_slot_index = 3;     // 장착된 슬롯 인덱스
  optional uint32 selected_promotion_1 = 4;    // 선택된 승급 옵션 1
  optional uint32 selected_promotion_2 = 5;    // 선택된 승급 옵션 2
}


message CommanderEquippedSkillData {
  uint32 slot_index = 1;
  uint32 commander_skill_id = 2;
}
