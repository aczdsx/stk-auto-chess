syntax = "proto3";

package tech.hive.v1;

import "base.proto";

service ChatService {
  /**
   * 채팅 서버 설정을 조회합니다.
   **/
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {}
}

enum ChatResponseStatus {
  CHAT_RESPONSE_UNDEFINED = 0; // 미사용
  CHAT_SERVER_NOT_CONFIGURED = 1100; // 채팅 서버 설정이 되지 않음
}

message GetConfigRequest {}
message GetConfigResponse {
  ResponseStatus status = 1;
  string chat_url = 2;
}