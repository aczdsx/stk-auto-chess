syntax = "proto3";

package cookapps.stkauto.v1;

import "base.proto";
import "common.proto";

// 가이드 미션 서비스
service MissionService {
  /**
   * 가이드 미션 목록 조회
   */
  rpc ListGuideMissions(ListGuideMissionsRequest) returns (ListGuideMissionsResponse);

  /**
   * 가이드 미션 진행 상황 업데이트
   */
  rpc UpdateGuideMissionProgress(UpdateGuideMissionProgressRequest) returns (UpdateGuideMissionProgressResponse);

  /**
   * 가이드 미션 보상 수령
   */
  rpc ClaimGuideMissionReward(ClaimGuideMissionRewardRequest) returns (ClaimGuideMissionRewardResponse);
}

// 에러 코드
enum MissionErrorCode {
  MISSION_UNSPECIFIED = 0;
  MISSION_NOT_FOUND = 2001;              // 미션을 찾을 수 없음
  MISSION_NOT_CLEARED = 2002;            // 미션이 클리어되지 않음
  MISSION_ALREADY_CLAIMED = 2003;        // 이미 보상을 수령함
  MISSION_INVALID_ORDER = 2004;          // 잘못된 미션 순서
}

// 가이드 미션 정보
message GuideMissionInfo {
  int32 mission_id = 1;           // 가이드 미션 아이디
  int32 order = 2;                // 미션 순서
  int32 action_count = 3;         // 현재 행동 횟수
  int32 target_count = 4;         // 목표 행동 횟수
  StateType state = 5;            // 미션 상태
  repeated RewardInfo rewards = 6; // 보상 목록
}

// 가이드 미션 목록 조회 요청
message ListGuideMissionsRequest {
  string player_id = 1;
}

// 가이드 미션 목록 조회 응답
message ListGuideMissionsResponse {
  ResponseStatus status = 1;
  int32 current_order = 2;                    // 현재 진행 중인 미션 순서
  repeated GuideMissionInfo missions = 3;     // 미션 목록
}

// 가이드 미션 진행 상황 업데이트 요청
message UpdateGuideMissionProgressRequest {
  string player_id = 1;
  int32 mission_id = 2;
  int32 action_count = 3;  // 증가시킬 행동 횟수
}

// 가이드 미션 진행 상황 업데이트 응답
message UpdateGuideMissionProgressResponse {
  ResponseStatus status = 1;
  GuideMissionInfo mission = 2;
}

// 가이드 미션 보상 수령 요청
message ClaimGuideMissionRewardRequest {
  string player_id = 1;
  int32 mission_id = 2;
}

// 가이드 미션 보상 수령 응답
message ClaimGuideMissionRewardResponse {
  ResponseStatus status = 1;
  GuideMissionInfo mission = 2;
  repeated RewardInfo rewards = 3;            // 수령한 보상 목록
  repeated CurrencyDelta currency_deltas = 4; // 재화 변동 내역
}
