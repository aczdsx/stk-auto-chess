syntax = "proto3";

package cookapps.stkauto.v1;

import "base.proto";
import "common.proto";

// 이벤트 서비스
service EventService {
  /**
   * 이벤트 목록 조회
   */
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);

  /**
   * 이벤트 상세 정보 조회
   */
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);

  /**
   * 이벤트 진행 상황 업데이트
   */
  rpc UpdateEventProgress(UpdateEventProgressRequest) returns (UpdateEventProgressResponse);

  /**
   * 이벤트 보상 수령
   */
  rpc ClaimEventReward(ClaimEventRewardRequest) returns (ClaimEventRewardResponse);
}

// 에러 코드
enum EventErrorCode {
  EVENT_UNSPECIFIED = 0;
  EVENT_NOT_FOUND = 2201;              // 이벤트를 찾을 수 없음
  EVENT_NOT_ACTIVE = 2202;             // 이벤트가 활성화되지 않음
  EVENT_CONDITION_NOT_MET = 2203;      // 이벤트 조건이 충족되지 않음
  EVENT_ALREADY_CLAIMED = 2204;        // 이미 보상을 수령함
  EVENT_EXPIRED = 2205;                // 이벤트가 만료됨
}

// 이벤트 정보
message EventInfo {
  int32 event_id = 1;                           // 이벤트 아이디
  string event_name = 2;                        // 이벤트 이름
  int32 action_count = 3;                       // 이벤트 행동 수치
  int64 start_timestamp = 4;                    // 이벤트 시작 시간
  int64 end_timestamp = 5;                      // 이벤트 종료 시간
  int64 event_refresh_timestamp = 6;            // 이벤트 갱신 시간
  int64 event_extra_refresh_timestamp = 7;      // 이벤트 별도 갱신 시간
  repeated EventConditionInfo conditions = 8;   // 이벤트 조건 목록
}

// 이벤트 조건 정보
message EventConditionInfo {
  int32 event_condition_id = 1;       // 이벤트 컨디션 아이디
  int32 condition_order = 2;          // 조건 순서
  int32 target_value = 3;             // 목표 값
  StateType state = 4;                // 이벤트 상태
  repeated RewardInfo rewards = 5;    // 보상 목록
}

// 이벤트 목록 조회 요청
message ListEventsRequest {
  string player_id = 1;
  bool include_expired = 2;  // 만료된 이벤트 포함 여부
}

// 이벤트 목록 조회 응답
message ListEventsResponse {
  ResponseStatus status = 1;
  repeated EventInfo events = 2;
}

// 이벤트 상세 정보 조회 요청
message GetEventRequest {
  string player_id = 1;
  int32 event_id = 2;
}

// 이벤트 상세 정보 조회 응답
message GetEventResponse {
  ResponseStatus status = 1;
  EventInfo event = 2;
}

// 이벤트 진행 상황 업데이트 요청
message UpdateEventProgressRequest {
  string player_id = 1;
  int32 event_id = 2;
  int32 action_count = 3;  // 증가시킬 행동 수치
}

// 이벤트 진행 상황 업데이트 응답
message UpdateEventProgressResponse {
  ResponseStatus status = 1;
  EventInfo event = 2;
}

// 이벤트 보상 수령 요청
message ClaimEventRewardRequest {
  string player_id = 1;
  int32 event_id = 2;
  int32 event_condition_id = 3;
}

// 이벤트 보상 수령 응답
message ClaimEventRewardResponse {
  ResponseStatus status = 1;
  EventInfo event = 2;
  repeated RewardInfo rewards = 3;            // 수령한 보상 목록
  repeated CurrencyDelta currency_deltas = 4; // 재화 변동 내역
}
