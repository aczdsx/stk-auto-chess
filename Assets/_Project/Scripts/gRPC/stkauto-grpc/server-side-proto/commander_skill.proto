syntax = "proto3";

package cookapps.stkauto.v1;

import "base.proto";
import "common.proto";

// 지휘자 스킬 서비스
service CommanderSkillService {
  /**
   * 지휘자 스킬 목록 조회
   */
  rpc ListCommanderSkills(ListCommanderSkillsRequest) returns (ListCommanderSkillsResponse);

  /**
   * 지휘자 스킬 장착
   */
  rpc EquipCommanderSkill(EquipCommanderSkillRequest) returns (EquipCommanderSkillResponse);

  /**
   * 지휘자 스킬 장착 해제
   */
  rpc UnequipCommanderSkill(UnequipCommanderSkillRequest) returns (UnequipCommanderSkillResponse);

  /**
   * 지휘자 스킬 레벨업
   */
  rpc LevelUpCommanderSkill(LevelUpCommanderSkillRequest) returns (LevelUpCommanderSkillResponse);

  /**
   * 지휘자 스킬 승급 선택
   */
  rpc SelectPromotion(SelectPromotionRequest) returns (SelectPromotionResponse);
}

// 에러 코드
enum CommanderSkillErrorCode {
  COMMANDER_SKILL_UNSPECIFIED = 0;
  COMMANDER_SKILL_NOT_FOUND = 2501;           // 스킬을 찾을 수 없음
  COMMANDER_SKILL_NOT_UNLOCKED = 2502;        // 스킬이 잠겨있음
  COMMANDER_SKILL_ALREADY_EQUIPPED = 2503;    // 이미 장착된 스킬
  COMMANDER_SKILL_SLOT_FULL = 2504;           // 슬롯이 가득 찼음
  COMMANDER_SKILL_MAX_LEVEL = 2505;           // 최대 레벨 도달
  COMMANDER_SKILL_INSUFFICIENT_RESOURCE = 2506; // 자원 부족
  COMMANDER_SKILL_INVALID_PROMOTION = 2507;   // 잘못된 승급 선택
}

// 지휘자 스킬 정보
message CommanderSkillInfo {
  int32 commander_skill_id = 1;       // 스킬 아이디
  int32 level = 2;                    // 레벨
  int32 max_level = 3;                // 최대 레벨
  bool is_unlocked = 4;               // 잠금 해제 여부
  bool is_equipped = 5;               // 장착 여부
  optional int32 equipped_slot_index = 6; // 장착된 슬롯 인덱스
  int32 selected_promotion_1 = 7;     // 선택된 승급 옵션 1
  int32 selected_promotion_2 = 8;     // 선택된 승급 옵션 2
}

// 지휘자 스킬 목록 조회 요청
message ListCommanderSkillsRequest {
  string player_id = 1;
}

// 지휘자 스킬 목록 조회 응답
message ListCommanderSkillsResponse {
  ResponseStatus status = 1;
  repeated CommanderSkillInfo skills = 2;
  map<int32, int32> equipped_skills = 3;  // key: slot_index, value: commander_skill_id
  int32 max_equipped_slots = 4;           // 최대 장착 슬롯 수
}

// 지휘자 스킬 장착 요청
message EquipCommanderSkillRequest {
  string player_id = 1;
  int32 commander_skill_id = 2;
  int32 slot_index = 3;
}

// 지휘자 스킬 장착 응답
message EquipCommanderSkillResponse {
  ResponseStatus status = 1;
  CommanderSkillInfo skill = 2;
  map<int32, int32> equipped_skills = 3;  // 업데이트된 장착 정보
}

// 지휘자 스킬 장착 해제 요청
message UnequipCommanderSkillRequest {
  string player_id = 1;
  int32 slot_index = 2;
}

// 지휘자 스킬 장착 해제 응답
message UnequipCommanderSkillResponse {
  ResponseStatus status = 1;
  map<int32, int32> equipped_skills = 2;  // 업데이트된 장착 정보
}

// 지휘자 스킬 레벨업 요청
message LevelUpCommanderSkillRequest {
  string player_id = 1;
  int32 commander_skill_id = 2;
}

// 지휘자 스킬 레벨업 응답
message LevelUpCommanderSkillResponse {
  ResponseStatus status = 1;
  CommanderSkillInfo skill = 2;
  repeated CurrencyDelta currency_deltas = 3; // 재화 변동 내역
}

// 지휘자 스킬 승급 선택 요청
message SelectPromotionRequest {
  string player_id = 1;
  int32 commander_skill_id = 2;
  int32 promotion_slot = 3;       // 승급 슬롯 (1 or 2)
  int32 promotion_option_id = 4;  // 선택한 승급 옵션 ID
}

// 지휘자 스킬 승급 선택 응답
message SelectPromotionResponse {
  ResponseStatus status = 1;
  CommanderSkillInfo skill = 2;
}
