syntax = "proto3";

package cookapps.stkauto.v1;

import "base.proto";
import "common.proto";

// 캐릭터 배치 덱 서비스
service DeckService {
  /**
   * 캐릭터 배치 덱 목록 조회
   */
  rpc ListBattleDecks(ListBattleDecksRequest) returns (ListBattleDecksResponse);

  /**
   * 캐릭터 배치 덱 조회
   */
  rpc GetBattleDeck(GetBattleDeckRequest) returns (GetBattleDeckResponse);

  /**
   * 캐릭터 배치 덱 저장
   */
  rpc SaveBattleDeck(SaveBattleDeckRequest) returns (SaveBattleDeckResponse);

  /**
   * 캐릭터 배치 덱 삭제
   */
  rpc DeleteBattleDeck(DeleteBattleDeckRequest) returns (DeleteBattleDeckResponse);
}

// 에러 코드
enum DeckErrorCode {
  DECK_UNSPECIFIED = 0;
  DECK_NOT_FOUND = 2401;                  // 덱을 찾을 수 없음
  DECK_INVALID_CHARACTER = 2402;          // 잘못된 캐릭터
  DECK_INVALID_POSITION = 2403;           // 잘못된 위치
  DECK_CHARACTER_NOT_OWNED = 2404;        // 소유하지 않은 캐릭터
  DECK_DUPLICATE_CHARACTER = 2405;        // 중복된 캐릭터
  DECK_SLOT_LIMIT_EXCEEDED = 2406;        // 덱 슬롯 제한 초과
}

// 캐릭터 배치 정보
message CharacterPlacement {
  int32 character_id = 1;       // 캐릭터 아이디
  int32 position_tile_x = 2;    // 배치된 타일 x 좌표
  int32 position_tile_y = 3;    // 배치된 타일 y 좌표
}

// 배치 덱 정보
message BattleDeckInfo {
  int32 deck_slot_id = 1;                         // 덱 슬롯 아이디 (1~N)
  string deck_name = 2;                           // 덱 이름
  repeated CharacterPlacement placements = 3;     // 캐릭터 배치 목록
  int64 last_updated_timestamp = 4;               // 마지막 업데이트 시간
}

// 캐릭터 배치 덱 목록 조회 요청
message ListBattleDecksRequest {
  string player_id = 1;
}

// 캐릭터 배치 덱 목록 조회 응답
message ListBattleDecksResponse {
  ResponseStatus status = 1;
  repeated BattleDeckInfo decks = 2;
  int32 max_deck_slots = 3;  // 최대 덱 슬롯 수
}

// 캐릭터 배치 덱 조회 요청
message GetBattleDeckRequest {
  string player_id = 1;
  int32 deck_slot_id = 2;
}

// 캐릭터 배치 덱 조회 응답
message GetBattleDeckResponse {
  ResponseStatus status = 1;
  BattleDeckInfo deck = 2;
}

// 캐릭터 배치 덱 저장 요청
message SaveBattleDeckRequest {
  string player_id = 1;
  int32 deck_slot_id = 2;
  optional string deck_name = 3;
  repeated CharacterPlacement placements = 4;
}

// 캐릭터 배치 덱 저장 응답
message SaveBattleDeckResponse {
  ResponseStatus status = 1;
  BattleDeckInfo deck = 2;
}

// 캐릭터 배치 덱 삭제 요청
message DeleteBattleDeckRequest {
  string player_id = 1;
  int32 deck_slot_id = 2;
}

// 캐릭터 배치 덱 삭제 응답
message DeleteBattleDeckResponse {
  ResponseStatus status = 1;
}
