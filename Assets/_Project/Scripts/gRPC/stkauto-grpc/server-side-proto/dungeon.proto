syntax = "proto3";

package cookapps.stkauto.v1;

import "base.proto";
import "common.proto";

// 던전 서비스
service DungeonService {
  /**
   * 시련 던전 목록 조회
   */
  rpc ListTrialDungeons(ListTrialDungeonsRequest) returns (ListTrialDungeonsResponse);

  /**
   * 시련 던전 입장
   */
  rpc EnterTrialDungeon(EnterTrialDungeonRequest) returns (EnterTrialDungeonResponse);

  /**
   * 시련 던전 클리어
   */
  rpc ClearTrialDungeon(ClearTrialDungeonRequest) returns (ClearTrialDungeonResponse);
}

// 에러 코드
enum DungeonErrorCode {
  DUNGEON_UNSPECIFIED = 0;
  DUNGEON_NOT_FOUND = 2301;              // 던전을 찾을 수 없음
  DUNGEON_NOT_UNLOCKED = 2302;           // 던전이 잠겨있음
  DUNGEON_ALREADY_CLEARED = 2303;        // 이미 클리어한 던전
  DUNGEON_INVALID_ORDER = 2304;          // 잘못된 던전 순서
  DUNGEON_INSUFFICIENT_AP = 2305;        // 행동력 부족
}

// 시련 던전 정보
message TrialDungeonInfo {
  int32 dungeon_id = 1;               // 던전 아이디
  int32 order = 2;                    // 던전 순서
  StateType state = 3;                // 던전 상태
  int32 required_ap = 4;              // 필요 행동력
  repeated RewardInfo rewards = 5;    // 보상 목록
  int64 clear_timestamp = 6;          // 클리어 시간
}

// 시련 던전 목록 조회 요청
message ListTrialDungeonsRequest {
  string player_id = 1;
}

// 시련 던전 목록 조회 응답
message ListTrialDungeonsResponse {
  ResponseStatus status = 1;
  repeated TrialDungeonInfo dungeons = 2;
  int32 current_order = 3;  // 현재 진행 가능한 던전 순서
}

// 시련 던전 입장 요청
message EnterTrialDungeonRequest {
  string player_id = 1;
  int32 dungeon_id = 2;
}

// 시련 던전 입장 응답
message EnterTrialDungeonResponse {
  ResponseStatus status = 1;
  string battle_session_id = 2;       // 전투 세션 ID
  TrialDungeonInfo dungeon = 3;
  repeated CurrencyDelta currency_deltas = 4; // 재화 변동 내역 (AP 소모)
}

// 시련 던전 클리어 요청
message ClearTrialDungeonRequest {
  string player_id = 1;
  int32 dungeon_id = 2;
  string battle_session_id = 3;
  bool is_victory = 4;                // 승리 여부
}

// 시련 던전 클리어 응답
message ClearTrialDungeonResponse {
  ResponseStatus status = 1;
  TrialDungeonInfo dungeon = 2;
  repeated RewardInfo rewards = 3;            // 수령한 보상 목록
  repeated CurrencyDelta currency_deltas = 4; // 재화 변동 내역
  int64 user_exp_gained = 5;                  // 획득한 유저 경험치
}
