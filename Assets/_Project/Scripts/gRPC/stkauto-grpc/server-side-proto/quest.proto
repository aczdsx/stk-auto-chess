syntax = "proto3";

package cookapps.stkauto.v1;

import "base.proto";
import "common.proto";

// 퀘스트 서비스
service QuestService {
  /**
   * 일일 퀘스트 목록 조회
   */
  rpc ListDailyQuests(ListDailyQuestsRequest) returns (ListDailyQuestsResponse);

  /**
   * 주간 퀘스트 목록 조회
   */
  rpc ListWeeklyQuests(ListWeeklyQuestsRequest) returns (ListWeeklyQuestsResponse);

  /**
   * 퀘스트 진행 상황 업데이트
   */
  rpc UpdateQuestProgress(UpdateQuestProgressRequest) returns (UpdateQuestProgressResponse);

  /**
   * 퀘스트 보상 수령
   */
  rpc ClaimQuestReward(ClaimQuestRewardRequest) returns (ClaimQuestRewardResponse);
}

// 에러 코드
enum QuestErrorCode {
  QUEST_UNSPECIFIED = 0;
  QUEST_NOT_FOUND = 2101;              // 퀘스트를 찾을 수 없음
  QUEST_NOT_CLEARED = 2102;            // 퀘스트가 클리어되지 않음
  QUEST_ALREADY_CLAIMED = 2103;        // 이미 보상을 수령함
  QUEST_EXPIRED = 2104;                // 퀘스트가 만료됨
}

// 퀘스트 타입
enum QuestType {
  QUEST_TYPE_UNSPECIFIED = 0;
  QUEST_TYPE_DAILY = 1;         // 일일 퀘스트
  QUEST_TYPE_WEEKLY = 2;        // 주간 퀘스트
  QUEST_TYPE_ACHIEVEMENT = 3;   // 업적 퀘스트
}

// 퀘스트 정보
message QuestInfo {
  int32 quest_id = 1;             // 퀘스트 아이디
  QuestType quest_type = 2;       // 퀘스트 타입
  int32 action_count = 3;         // 현재 행동 횟수
  int32 target_count = 4;         // 목표 행동 횟수
  StateType state = 5;            // 퀘스트 상태
  repeated RewardInfo rewards = 6; // 보상 목록
  int64 expire_timestamp = 7;     // 만료 시간
}

// 일일 퀘스트 목록 조회 요청
message ListDailyQuestsRequest {
  string player_id = 1;
}

// 일일 퀘스트 목록 조회 응답
message ListDailyQuestsResponse {
  ResponseStatus status = 1;
  repeated QuestInfo quests = 2;
  int64 next_refresh_timestamp = 3;  // 다음 갱신 시간
}

// 주간 퀘스트 목록 조회 요청
message ListWeeklyQuestsRequest {
  string player_id = 1;
}

// 주간 퀘스트 목록 조회 응답
message ListWeeklyQuestsResponse {
  ResponseStatus status = 1;
  repeated QuestInfo quests = 2;
  int64 next_refresh_timestamp = 3;  // 다음 갱신 시간
}

// 퀘스트 진행 상황 업데이트 요청
message UpdateQuestProgressRequest {
  string player_id = 1;
  int32 quest_id = 2;
  QuestType quest_type = 3;
  int32 action_count = 4;  // 증가시킬 행동 횟수
}

// 퀘스트 진행 상황 업데이트 응답
message UpdateQuestProgressResponse {
  ResponseStatus status = 1;
  QuestInfo quest = 2;
}

// 퀘스트 보상 수령 요청
message ClaimQuestRewardRequest {
  string player_id = 1;
  int32 quest_id = 2;
  QuestType quest_type = 3;
}

// 퀘스트 보상 수령 응답
message ClaimQuestRewardResponse {
  ResponseStatus status = 1;
  QuestInfo quest = 2;
  repeated RewardInfo rewards = 3;            // 수령한 보상 목록
  repeated CurrencyDelta currency_deltas = 4; // 재화 변동 내역
}
