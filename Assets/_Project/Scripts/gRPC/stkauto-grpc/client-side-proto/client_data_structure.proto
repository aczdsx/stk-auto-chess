// 보상
message Reward {
  int32 reward_type = 1;
  int32 reward_key = 2;
  int32 reward_count = 3;
}
// ---------------------------


// 저장 데이터 우선순위 파악용
message UserDataSequence {
  int64 sequence = 1;
}
// ---------------------------


// 유저 정보
message UserBasicData {
  int64 uid = 101;
  int32 server_id = 102;
  string player_id = 103;
  
  int32 level = 110;
  int64 exp = 111;
  string nickname = 112;
  int32 user_icon_id = 113;
  int64 last_login_timestamp = 114;
  int32 max_squad_count = 115;

  int32 total_play_time = 120;
  int32 daily_visit_count = 121;
  int32 since_join_date = 122;
  int64 user_install_date = 123;
  int64 daily_visit_count_timestamp = 124;
  
  // 캐릭터 초기화 관련
  int32 reset_character_count = 130;        // 캐릭터 초기화 횟수
  int64 reset_character_timestamp = 131;    // 캐릭터 초기화 횟수 리셋 시간
  
  // 행동력 충전 관련
  int64 ap_refresh_timestamp = 140;                // 행동력 충전 갱신 시간
  int64 ap_next_timestamp = 141;                   // 다음 행동력 충전까지 남은 시간

  int32 total_gacha_count = 150;  // 총 가챠 누적 진행 횟수

  int32 user_stage_lose_count = 151;  // 스테이지 플레이 실패 횟수
  int32 user_dungeon_lose_count = 152;  // 던전 플레이 실패 횟수
}
// ---------------------------

// 유저 상점 및 구매 관련 정보

message UserShopPurchase {
  map<int32, UserShopBannerData> user_shop_banner_datas = 201;  // 상점 배너 노출 관련 데이터 (key: shop_id, value: UserShopBannerData)
  map<int32, UserPurchaseData> user_purchase_datas = 202;  // 구매 관련 데이터 (key: shop_id, value: UserPurchaseData)
}

// 상점 배너 노출 관련 데이터
message UserShopBannerData {
  int32 shop_id = 101; // 상점 아이디
  int32 show_condition_value = 102; // 노출 조건 카운트
  int32 shop_banner_state_type = 103; // 상점 배너 상태 (ex: 미노출, 노출)
  int32 show_count = 104; // 노출 횟수
  int64 end_purchase_timestamp = 105; // 구매 가능 종료 시간
}

// 구매 관련 데이터
message UserPurchaseData {
  int32 shop_id = 101; // 구매 품목 상점 아이디
  int32 purchase_count = 102; // 구매 횟수
  int64 purchase_timestamp = 103; // 구매 시간
}

// ---------------------------

// 유저 미션 관련 정보 (가이드 미션 등)
message UserMissionData {
  // 가이드 미션
  int32 guide_mission_current_order = 101;

  map<int32, UserGuideMission> user_guide_missions = 102; // key: Order, value: UserGuideMission
  repeated int32 user_dialogue_group_ids = 103; // 게임 내 다이얼로그 히스토리 기록용 아이디 리스트 (dialogue_group_id)
}

// 가이드 미션 데이터
message UserGuideMission{
  int32 mission_id = 101;         // 가이드 미션 아이디
  int32 action_count = 102;       // 행동 횟수
  int32 mission_state_type = 103;  // 미션 상태 (ex: 클리어, 진행중, 완료)
}

// ---------------------------

// 유저 퀘스트 관련 정보
message UserQuest {
  int64 last_quest_refresh_timestamp = 101; // 마지막 퀘스트 갱신 시간

  int64 next_daily_refresh_timestamp = 102; // 다음 일일 퀘스트 갱신 시간
  int64 next_weekly_refresh_timestamp = 103; // 다음 주간 퀘스트 갱신 시간

  map<int32, UserQuestData> user_quest_daily_datas = 201;  // 일일 퀘스트 데이터 (key: quest_id, value: UserQuestData)
  map<int32, UserQuestData> user_quest_weekly_datas = 202; // 주간 퀘스트 데이터 (key: quest_id, value: UserQuestData)
}

// 퀘스트 데이터
message UserQuestData{
  int32 quest_id = 101;         // 퀘스트 아이디
  int32 action_count = 102;       // 행동 횟수
  int32 quest_state_type = 103;  // 퀘스트 상태 (ex: 클리어, 진행중, 완료)
}

// ---------------------------

// 유저 이벤트 관련 정보
message UserEvent {
  map<int32, UserEventData> user_event_datas = 201;  // 이벤트 데이터 (key: event_id, value: UserEventData)
}

// 이벤트 데이터
message UserEventData{
  int32 event_id = 101;                         // 이벤트 아이디
  int32 action_count = 102;                     // 이벤트 행동 수치
  int64 event_refresh_timestamp = 103;          // 이벤트 갱신 시간 (이벤트를 완전히 초기화)
  int64 event_extra_refresh_timestamp = 104;    // 이벤트 별 별도 갱신 시간 (ex: 출석 체크)

  map<int32, UserEventConditionData> user_event_condition_datas = 201;  // 이벤트 컨디션 데이터 (key: event_condition_id, value: UserEventConditionData)
}

// 이벤트 컨디션 데이터
message UserEventConditionData{
  int32 event_condition_id = 101;     // 이벤트 컨디션 아이디
  int32 event_state_type = 102;       // 이벤트 상태 (ex: 클리어, 진행중, 완료)
}

// ---------------------------

// 유저 던전 관련 정보
message UserDungeon {
  map<int32, UserTrialDungeonData> user_trial_dungeon_datas = 101;   // 시련 던전 데이터 (key: dungeon_id, value: UserTrialDungeonData)
}

// 시련 던전 데이터
message UserTrialDungeonData{
  int32 dungeon_id = 101;           // 던전 아이디
  int32 order = 102;                // 던전 순서
  int32 dungeon_state_type = 103;   // 던전 상태 (ex: 클리어, 진행중, 완료)
}

// ---------------------------

// 유저 지갑 정보
message UserWallet {
  int32 gold = 101;
  int32 jewel = 102;
  int32 ap = 103;
  int32 c_ticket = 104;
  int32 w_ticket = 105;
  int32 char_user_exp_item = 106;
  int32 char_user_exp_item_2 = 107;
  int32 pvp_ticket = 108;

  int32 char_transcendence_fire = 120;
  int32 char_transcendence_water = 121;
  int32 char_transcendence_earth = 122;
  int32 char_transcendence_wind = 123;
  int32 char_transcendence_light = 124;
  int32 char_transcendence_dark = 125;
}
// ---------------------------


// 유저 스테이지 정보
message UserStageGroup {
  // 현재 선택된 스테이지 아이디
  int32 last_play_stage_id = 101;

  //스테이지 클리어 상태 데이터
  map<int32, UserStage> user_stages = 155; // key: stage_id, value: UserStageDic

  //스테이지 별 누적 보상 수령 데이터
  map<int32, UserStageAccRewardDic> user_stage_acc_rewards = 156; // key: chapter_id, value: UserStageAccReward
}

message UserStage {
  int32 stage_id = 101; // 스테이지 아이디
  int32 star_count = 102; // 별 개수
}

message UserStageAccRewardDic {
  map<int32, UserStageAccRewardList> stage_acc_reward_dic = 101; // key: difficulty_type, value: 누적 별 갯수
}

message UserStageAccRewardList {
  repeated int32 stage_acc_reward_list = 101;
}

// ---------------------------


// 유저 캐릭터 정보
message UserCharacterGroup {
  map<int32, UserCharacter> user_characters = 101;
  repeated UserCharacterBattle user_character_battles = 102;
  map<int32, UserCharacterBattleDeckList> user_character_battle_deck_dic = 103;
}

message UserCharacter {
  int32 character_id = 101; // 캐릭터 아이디
  int32 level = 102; // 레벨
  int32 exp = 103; // 경험치
  int32 star_level = 104; // 별 레벨
  int32 character_piece = 105; // 캐릭터 조각
  int32 transcendence_level = 106; // 초월 레벨
}

// 유저 캐릭터 전투 관련 정보
message UserCharacterBattle{
  int32 attack = 101; // 공격력
  int32 defense = 102; // 방어력
  int32 hp = 103; // 체력
  int32 critical = 104; // 크리티컬
  int32 attack_speed = 105; // 공격 속도
  int32 move_speed = 106; // 이동 속도
  int32 attack_range = 107; // 공격 범위
}

// 유저 캐릭터 전투 배치 관련 정보
message UserCharacterBattleDeck{
  int32 character_id = 101; // 캐릭터 아이디
  int32 position_tile_x = 102;     // 배치된 타일 x 좌표
  int32 position_tile_y = 103;     // 배치된 타일 y 좌표
}

// 유저 캐릭터 전투 배치 관련 정보 리스트
message UserCharacterBattleDeckList{
  repeated UserCharacterBattleDeck user_character_battle_decks = 101;
}

// ---------------------------

// 유저 방치 보상 컨텐츠 관련 정보
message UserIdleData {
  // 마지막 방치 보상 수령 시간
  int64 last_reward_get_timestamp = 101;
}

// ---------------------------

// 유저 지휘자 스킬 관련 정보
message UserCommanderSkillData {
  // 현재 장착된 지휘자 스킬 ID
  map<int32, int32> equipped_commander_skill_ids = 101; // key: slot_index, value: commander_skill_id

  // 사용 가능한 지휘자 스킬 리스트
  repeated UserCommanderSkill user_commander_skill_list = 102;
}

message UserCommanderSkill {
  int32 commander_skill_id = 101; // 스킬 아이디
  int32 level = 102; // 레벨
}

// ---------------------------


// 유저 팀 정보
message UserDeck {
  repeated UserDeckLine line_characters = 101;
}

message UserDeckLine {
  repeated int32 character_ids = 101; // 캐릭터 아이디
}
// ---------------------------

// 유저 pvp 정보
message UserPVP {
  int32 recent_season_id = 101;     // 최근 참여한 pvp 시즌 아이디
  int32 rank_id = 102;              // 현재 시즌 pvp 랭크 아이디
  int32 rank_point = 103;            // 현재 시즌 pvp 랭크 포인트
  int32 ranking = 104;              // 현재 시즌 pvp 랭킹
  int32 match_refresh_cnt = 105;    // 매칭 리스트 갱신 횟수
  int32 daily_reward_cnt = 106;     // 일일 보상 수령 횟수
  int32 buy_ticket_cnt = 107;     // pvp 티켓 구매 횟수

  int64 refresh_matching_cnt_timestamp = 120;                     // 매칭 리스트 횟수 갱신 시간
  int64 auto_refresh_matching_list_timestamp = 121;               // 매칭 리스트 자동 갱신 시간
  int64 next_refresh_matching_list_timestamp = 122;               // 다음 매칭 리스트 갱신 시간
  int64 refresh_ranking_timestamp = 123;                        // 랭킹 리스트 갱신 시간
  int64 auto_refresh_profile_timestamp = 124;                   // 프로필 자동 갱신 시간
  int64 daily_reward_reset_timestamp = 125;                   // 일일 보상 수령 갱신 시간
  
  // pvp 티켓 관련
  int64 buy_ticket_reset_timestamp = 126;                                 // PVP 티켓 구매 갱신 시간
  int64 pvp_ticket_refresh_timestamp = 127;                               // PVP 티켓 갱신 시간
  int64 pvp_ticket_next_timestamp = 128;                                  // PVP 티켓 다음 충전 시간

  UserPVPBattleDeckList my_pvp_attack_deck_list = 130; // 유저 PVP 전투 공격 배치 관련 정보 리스트
  UserPVPBattleDeckList my_pvp_defense_deck_list = 131; // 유저 PVP 전투 방어 배치 관련 정보 리스트
  
  map<string, UserPVPBattleSimpleData> current_pvp_matching_dic = 140; // PVP 매칭 리스트 (key: playerID, value: UserPVPBattleSimpleData)
}

// PVP 전투 관련 간단한 데이터 (공용) -> 다른 유저 정보를 저장하는데에도 사용
message UserPVPBattleSimpleData{
  string player_id = 101;          // 플레이어 아이디
  int32 server_id = 102;          // 서버 아이디
  int32 rank_id = 103;            // 랭크 아이디
  int32 rank_point = 104;         // 랭크 포인트
  int32 ranking = 105;            // 랭킹
  string nickname = 106;           // 닉네임
  //int32 character_icon_id = 107;  // 캐릭터 아이콘 아이디
  int32 player_lv = 108;       // 플레이어 레벨
  int32 battle_point = 109;       // 전투력
  int64 refresh_timestamp = 110;  // 갱신 시간
  int32 match_result = 111;       // 매칭 결과 (0: 미결정, 1: 승리, 2: 패배, 3: 무승부)

  repeated UserPVPCharacterSimpleDeck simple_deck_list = 130; // 유저 PVP 전투 배치 관련 정보 리스트
}

// 유저 PVP 캐릭터 배치 관련 정보 (간단한 정보)
message UserPVPCharacterSimpleDeck{
  int32 id = 101; // 캐릭터 아이디
  int32 lv = 102; // 캐릭터 레벨
}

// PVP 전투 관련 데이터 (공용) -> 다른 유저 정보를 저장하는데에도 사용
message UserPVPBattleDetailData{
  string player_id = 101;          // 플레이어 아이디
  int32 server_id = 102;          // 서버 아이디
  int32 rank_id = 103;            // 랭크 아이디
  int32 rank_point = 104;         // 랭크 포인트
  int32 ranking = 105;            // 랭킹
  string nickname = 106;           // 닉네임
  //int32 character_icon_id = 107;  // 캐릭터 아이콘 아이디
  int32 player_lv = 108;       // 플레이어 레벨
  int32 battle_point = 109;       // 전투력
  int64 refresh_timestamp = 110;  // 갱신 시간
  int32 match_id = 111;           // 매치 아이디 (매치 결과 저장용)

  UserPVPBattleDeckList pvp_deck_list = 130; // 유저 PVP 전투 배치 관련 정보 리스트
}

// 유저 PVP 전투 배치 관련 정보 리스트
message UserPVPBattleDeckList{
  repeated UserPVPCharacterBattleDeck pvp_character_decks = 101;
  repeated UserPVPObstacleBattleDeck pvp_obstacle_decks = 102;
  repeated EffectCodeInfoProto effect_code_infos = 103;
}

// 유저 PVP 캐릭터 배치 관련 정보
message UserPVPCharacterBattleDeck{
  int32 id = 101; // 캐릭터 아이디
  int32 lv = 102; // 캐릭터 레벨
  //int32 star_lv = 103; // 캐릭터 초월레벨

  int32 pos_x = 110;     // 배치된 타일 x 좌표
  int32 pos_y = 111;     // 배치된 타일 y 좌표

  repeated EffectCodeInfoProto effect_code_info = 106;
}

// 유저 PVP 장애물 배치 관련 정보
message UserPVPObstacleBattleDeck{
  int32 id = 101; // 장애물 오브젝트 아이디

  int32 pos_x = 102;     // 배치된 타일 x 좌표
  int32 pos_y = 103;     // 배치된 타일 y 좌표
}

message EffectCodeInfoProto {
  int64 id = 101;
  // int32 p= 102;
  repeated double stat = 103;
}

// ----------------------------
