syntax = "proto3";

package cookapps.stkauto.v1;

enum DataCategory {
  none = 0;
  user_data = 1;
  user_wallet = 2;
  user_stage_group = 3;
  user_character_group = 4;
  user_deck = 5;
  user_mission_data = 6;
  user_idle_data = 7;
  user_commander_skill_data = 8;
  user_quest = 9;
  user_event = 10;
  user_dungeon = 11;
  user_pvp = 12;
  user_shop_purchase = 13;
}

