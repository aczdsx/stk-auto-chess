name: 🚀 Release to Google Play

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  build:
    name: Build for Android and release to Google Play
    runs-on: [self-hosted, macOS, ARM64, unity-builder, production]
    steps:
      # Checkout
      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
      - name: Git clean manually
        run: git clean -ffdx -e Library/

      # Unity build
      - name: Request Unity license
        id: license
        uses: cookapps-devops/tech-build/.github/actions/request-license@v1
      - name: Build
        uses: game-ci/unity-builder@v4.1.3
        env:
          UNITY_SERIAL: ${{ steps.license.outputs.unity-serial }}
          UNITY_EMAIL: ${{ steps.license.outputs.unity-email }}
          UNITY_PASSWORD: ${{ steps.license.outputs.unity-password }}
        with:
          targetPlatform: Android
          versioning: None
          buildMethod: # FIXME
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          customParameters: >
            -EnableCacheServer
            -cacheServerEndpoint ${{ vars.UNITY_ACCELERATOR_ENDPOINT }}
            -cacheServerNamespacePrefix ${{ github.repository }}
            -cacheServerEnableDownload true
            -cacheServerEnableUpload true
      - name: Return Unity license
        if: ${{ always() && steps.license.outcome == 'success' }}
        uses: cookapps-devops/tech-build/.github/actions/return-license@v1
        with:
          unity-license: ${{ toJSON(steps.license.outputs) }}
      - name: Extract data from build summary file
        id: build-summary
        uses: cookapps-devops/tech-build/.github/actions/build-summary@v1
        with:
          build-summary-file-path: Builds/build-summary.json

      # Deploy
      - name: Deploy to Google Play
        env:
          GOOGLE_PLAY_KEY_FILE: ${{ secrets.GOOGLE_PLAY_KEY_FILE }}
          GOOGLE_PLAY_KEY_FILE_PATH: ${{ format('{0}/fastlane/google-fastlane.json', github.workspace) }}
          ANDROID_BUILD_FILE_PATH: ${{ steps.build-summary.outputs.output-path }}
          ANDROID_SYMBOL_FILE_PATH: ${{ steps.build-summary.outputs.symbol-path }}
          ANDROID_PACKAGE_NAME: ${{ steps.build-summary.outputs.identifier }}
        run: |
          echo "$GOOGLE_PLAY_KEY_FILE" > $GOOGLE_PLAY_KEY_FILE_PATH
          fastlane android internal
      - name: Upload symbols to Firebase Crashlytics
        env:
          CRASHLYTICS_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
          SYMBOL_PATH: ${{ steps.build-summary.outputs.symbol-path }}
        run: firebase crashlytics:symbols:upload --app=${CRASHLYTICS_APP_ID} ${SYMBOL_PATH}

      # Notify Slack
      - name: Notify Slack
        if: success() || failure()
        uses: slackapi/slack-github-action@v1
        env:
          # Post a message by utilizing incoming webhook
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

          # Environment variables for payload
          TEXT: ${{ job.status == 'success' && 'Build finished successfully!' || job.status == 'failure' && 'Failed to build the application.' }}
          JOB_STATUS_COLOR: ${{ job.status == 'success' && '#00FF00' || job.status == 'failure' && '#FF0000' }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          PLATFORM: ${{ steps.build-summary.outputs.platform }}
          VERSION: ${{ steps.build-summary.outputs.version }}
          VERSION_CODE: ${{ steps.build-summary.outputs.version-code }}
          DOWNLOAD_URL: ${{ job.status == 'success' && format('https://play.google.com/apps/test/{0}/{1}', steps.build-summary.outputs.identifier, steps.build-summary.outputs.version-code) || job.status == 'failure' && 'https://github.com' }}
        with:
          payload-file-path: .github/slack/payload-slack-content.json

  error-solution:
    needs: [ build ]
    if: failure()
    name: Build Error solution
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Detect error
        id: detect-error
        uses: cookapps-devops/tech-build/.github/actions/error-solution@v1
        with:
          api-key: ${{ secrets.OPENAI_API_KEY }}
